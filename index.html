<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Y2MP3 Desktop</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #101010;
      color: #f7f7f7;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 24px;
    }
    header h1 {
      margin: 0;
      font-size: 28px;
    }
    .subtext {
      color: #b3b3b3;
      font-size: 14px;
      line-height: 1.5;
    }
    .card {
      background: #171717;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .quality-select {
      min-width: 140px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      padding: 12px 14px;
      background: #ffffff; /* use white background for system dropdowns */
      color: #101010; /* dark text so options are readable */
      font-size: 14px;
      height: 46px;
      outline: none;
    }
    input[type="text"] {
      flex: 1;
      min-width: 260px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.04);
      color: #fff;
      font-size: 15px;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: rgba(255, 255, 255, 0.28);
    }
    button {
      appearance: none;
      border: none;
      border-radius: 14px;
      background: #ffffff;
      color: #101010;
      font-weight: 700;
      padding: 0 18px;
      min-width: 140px;
      height: 46px;
      cursor: pointer;
      transition: transform 0.18s ease, background-color 0.18s ease;
    }
    button:hover {
      background: #ededed;
    }
    button:active {
      transform: scale(0.98);
    }
    .status-panel {
      margin-top: 28px;
      padding: 24px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
    }
    .progress-subsection {
      margin-bottom: 18px;
    }
    .subheading {
      font-size: 14px;
      color: #d0d0d0;
      margin-bottom: 8px;
    }
    .status-title {
      font-size: 18px;
      margin-bottom: 10px;
    }
    .progress-bar {
      width: 100%;
      height: 14px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: #4caf50;
      transition: width 0.25s ease;
    }
    .status-text {
      color: #c9c9c9;
      font-size: 14px;
      line-height: 1.6;
      min-height: 40px;
    }
    .progress-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      color: #bfbfbf;
      font-size: 13px;
    }
    .progress-percent {
      font-weight: 700;
      color: #f0f0f0;
    }
    .download-info {
      margin-top: 8px;
      color: #aaa;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>Y2MP3 Desktop</h1>
        <p class="subtext">YouTube 영상을 MP3로 변환하여 바로 내 PC에 저장하는 간편한 데스크톱 앱입니다.</p>
      </div>
    </header>

    <div class="card">
      <div class="row">
        <input id="videoUrl" type="text" placeholder="https://www.youtube.com/watch?v=..." />
        <select id="qualitySelect" class="quality-select" title="MP3 음질">
          <option value="64k">64 kbps</option>
          <option value="96k">96 kbps</option>
          <option value="128k">128 kbps</option>
          <option value="192k" selected>192 kbps</option>
          <option value="320k">320 kbps</option>
        </select>
        <button id="convertButton">MP3 변환</button>
      </div>
      <div class="row" style="margin-top: 12px;">
        <input id="outputPath" type="text" readonly placeholder="저장 폴더를 선택하세요." />
        <button id="selectFolderButton">저장 위치 선택</button>
        <button id="openFolderButton">저장 위치 열기</button>
      </div>

      <div class="status-panel">
        <div class="status-title" id="statusTitle">준비 완료</div>
        <div class="progress-subsection">
          <div class="subheading" id="stageSubheading">진행 상태</div>
          <div class="progress-meta">
            <span id="stageMeta">대기 중</span>
            <span class="progress-percent" id="progressPercent">0%</span>
          </div>
          <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
          <div class="status-text" id="statusText">유튜브 URL을 입력하고 MP3 변환 버튼을 눌러주세요.</div>
        </div>

        <div class="download-info" id="outputInfo"></div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
